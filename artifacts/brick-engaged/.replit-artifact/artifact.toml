kind = "web"
previewPath = "/"
title = "Brick Engaged"
version = "1.0.0"
id = "artifacts/brick-engaged"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21701

[services.development]
run = "pnpm --filter @workspace/brick-engaged run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brick-engaged", "run", "build" ]
publicDir = "artifacts/brick-engaged/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21701"
BASE_PATH = "/"
